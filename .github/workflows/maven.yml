name: Test Automation Workflow

on:
  schedule:
    - cron: '0 18 * * *'   # Runs daily at 6 PM UTC
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout source code
        uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: temurin
          cache: maven

      # Prepare folders
      - name: Prepare folders
        run: |
          mkdir -p logs
          mkdir -p screenshots
          mkdir -p public/extent-reports

      # Run tests (DO NOT fail pipeline)
      - name: Run Test Automation Framework
        run: |
          mvn -B test -Dbrowser=chrome -DisHeadless=true -DisLambdaTest=false || true

      # Debug (optional but useful)
      - name: Debug folders
        if: always()
        run: |
          echo "Listing project root:"
          ls -R
          echo "Listing target folder:"
          ls -R target || true

      # Upload logs
      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: logs/

      # Upload screenshots
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/

      # Upload all reports (backup)
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            report.html
            target/**/*.html

      # Copy report for GitHub Pages
      - name: Prepare GitHub Pages content
        if: always()
        run: |
          mkdir -p public/extent-reports

          # Copy report safely
          if [ -f report.html ]; then
            cp report.html public/extent-reports/index.html
            echo "Report copied as index.html"
          else
            echo "<h1>No Report Generated</h1>" > public/extent-reports/index.html
          fi

          # Copy screenshots if exist
          if [ -d screenshots ]; then
            cp -R screenshots public/extent-reports/
          fi

          echo "Final public folder structure:"
          ls -R public

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.PAT1234 }}
          branch: gh-pages
          folder: public/extent-reports
          clean: true
